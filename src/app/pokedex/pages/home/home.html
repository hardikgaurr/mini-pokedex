<mat-drawer-container autosize>

  <mat-drawer
    #drawer
    mode="side"
    position="end"
    [opened]="selectedPokemon() !== null">

    <app-pokemon-drawer
      [pokemon]="selectedPokemon()">
    </app-pokemon-drawer>

  </mat-drawer>

<mat-drawer-content>

  <h1>Mini Pokédex</h1>

  @if (loading()) {

    <div class="center">
      <mat-spinner></mat-spinner>
    </div>

  } @else if (error()) {

    <h2>{{ error() }}</h2>

  } @else if (pokemons().length === 0) {

    <h2>No Pokémon found.</h2>

  } @else {

    <app-pokemon-table
      [pokemons]="pokemons()">
    </app-pokemon-table>

  }

</mat-drawer-content>
<app-team-builder></app-team-builder>
</mat-drawer-container>
