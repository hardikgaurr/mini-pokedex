<mat-form-field appearance="outline" style="width: 350px; margin-bottom: 16px;">
  <mat-label>Search Pokémon</mat-label>

  <input
    matInput
    #search
    placeholder="Search..."
    (input)="onSearch(search.value)">
</mat-form-field>

<table
  mat-table
  [dataSource]="dataSource"
  matSort>

  <!-- Sprite -->
  <ng-container matColumnDef="sprite">
    <th mat-header-cell *matHeaderCellDef>Sprite</th>

    <td mat-cell *matCellDef="let pokemon">
      <img
        [src]="pokemon.sprite"
        [alt]="pokemon.name"
        width="60">
    </td>
  </ng-container>

  <!-- Name -->
  <ng-container matColumnDef="name">
    <th
      mat-header-cell
      *matHeaderCellDef
      mat-sort-header>
      Name
    </th>

    <td mat-cell *matCellDef="let pokemon">
      {{ pokemon.name | titlecase }}
    </td>
  </ng-container>

  <!-- Types -->
  <ng-container matColumnDef="types">
    <th mat-header-cell *matHeaderCellDef>
      Types
    </th>

    <td mat-cell *matCellDef="let pokemon">
      {{ pokemon.types.join(', ') }}
    </td>
  </ng-container>

  <!-- Team -->
  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef>
      Team
    </th>

    <td mat-cell *matCellDef="let pokemon">

      <button
        mat-raised-button
        color="primary"
        [disabled]="isInTeam(pokemon.id) || isTeamFull"
        (click)="addToTeam(pokemon); $event.stopPropagation()">

        @if (isInTeam(pokemon.id)) {
          Added
        } @else if (isTeamFull) {
          Full
        } @else {
          Add
        }

      </button>

    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>

  <tr
    mat-row
    *matRowDef="let row; columns: displayedColumns;"
    (click)="onRowClick(row)"
    style="cursor: pointer">
  </tr>

</table>

<mat-paginator
  [pageSize]="5"
  [pageSizeOptions]="[5, 10, 20]"
  showFirstLastButtons>
</mat-paginator>
