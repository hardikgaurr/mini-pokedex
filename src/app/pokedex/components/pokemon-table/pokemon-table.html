<mat-form-field appearance="outline" style="width:350px;margin-bottom:16px;">
  <mat-label>Search Pokémon</mat-label>

  <input
    matInput
    #search
    placeholder="Search..."
    (input)="onSearch(search.value)">
</mat-form-field>

<table
  mat-table
  [dataSource]="dataSource"
  matSort>

  <ng-container matColumnDef="sprite">
    <th mat-header-cell *matHeaderCellDef>
      Sprite
    </th>

    <td mat-cell *matCellDef="let pokemon">
      <img
        [src]="pokemon.sprite"
        [alt]="pokemon.name"
        width="60">
    </td>
  </ng-container>

  <ng-container matColumnDef="name">
    <th
      mat-header-cell
      *matHeaderCellDef
      mat-sort-header>
      Name
    </th>

    <td mat-cell *matCellDef="let pokemon">
      {{ pokemon.name }}
    </td>
  </ng-container>

  <ng-container matColumnDef="types">
    <th
      mat-header-cell
      *matHeaderCellDef
      mat-sort-header>
      Types
    </th>

    <td mat-cell *matCellDef="let pokemon">
      {{ pokemon.types.join(', ') }}
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>

  <tr
    mat-row
    *matRowDef="let row; columns: displayedColumns;">
  </tr>

</table>
