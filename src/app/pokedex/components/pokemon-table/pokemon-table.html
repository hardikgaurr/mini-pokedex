<mat-card class="table-card">

  <div class="table-toolbar">

    <div class="toolbar-left">
      <h2>Pokédex</h2>
      <span>{{ dataSource.data.length }} Pokémon</span>
    </div>

    <mat-form-field
      appearance="outline"
      class="search-field">

      <mat-icon matPrefix>
        search
      </mat-icon>

      <input
        matInput
        #search
        placeholder="Search by name..."
        (input)="onSearch(search.value)" />

    </mat-form-field>

  </div>

  <div class="table-wrapper">

    <table
      mat-table
      [dataSource]="dataSource"
      matSort>

      <!-- Sprite -->

      <ng-container matColumnDef="sprite">

        <th mat-header-cell *matHeaderCellDef>
          Pokémon
        </th>

        <td mat-cell *matCellDef="let pokemon">

          <div class="sprite-wrapper">
            <img
              [src]="pokemon.sprite"
              [alt]="pokemon.name" />
          </div>

        </td>

      </ng-container>

      <!-- Name -->

      <ng-container matColumnDef="name">

        <th
          mat-header-cell
          *matHeaderCellDef
          mat-sort-header>

          Name

        </th>

        <td mat-cell *matCellDef="let pokemon">

          <div class="pokemon-info">

            <div class="pokemon-name">
              {{ pokemon.name | titlecase }}
            </div>

            <div class="pokemon-id">
              #{{ pokemon.id }}
            </div>

          </div>

        </td>

      </ng-container>

      <!-- Types -->

      <ng-container matColumnDef="types">

        <th mat-header-cell *matHeaderCellDef>
          Types
        </th>

        <td mat-cell *matCellDef="let pokemon">

          <div class="type-list">

            @for (
              type of pokemon.types;
              track trackType($index, type)
            ) {

              <mat-chip
                class="type-chip"
                [class]="getTypeClass(type)">

                {{ type | titlecase }}

              </mat-chip>

            }

          </div>

        </td>

      </ng-container>

      <!-- Team -->

      <ng-container matColumnDef="actions">

        <th mat-header-cell *matHeaderCellDef>
          Team
        </th>

        <td mat-cell *matCellDef="let pokemon">

          <button
            mat-flat-button
            color="primary"
            class="team-button"
            [disabled]="isInTeam(pokemon.id) || isTeamFull"
            [matTooltip]="buttonTooltip(pokemon)"
            (click)="addToTeam(pokemon); $event.stopPropagation()">

            <mat-icon>
              {{ buttonIcon(pokemon) }}
            </mat-icon>

            {{ buttonLabel(pokemon) }}

          </button>

        </td>

      </ng-container>

      <tr
        mat-header-row
        *matHeaderRowDef="displayedColumns; sticky: true">
      </tr>

      <tr
        mat-row
        class="pokemon-row"
        *matRowDef="let row; columns: displayedColumns"
        (click)="onRowClick(row)">
      </tr>

    </table>

  </div>

  <div class="table-footer">

    <mat-paginator
      #paginator
      [length]="dataSource.data.length"
      [pageSize]="5"
      [pageSizeOptions]="[5, 10, 20]"
      showFirstLastButtons>

    </mat-paginator>

  </div>

</mat-card>
